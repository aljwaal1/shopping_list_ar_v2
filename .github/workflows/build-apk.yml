name: Build Signed Google Play AAB and APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "apk/**"
      - "play/**"
      - "DOWNLOAD_APK.md"
      - "DOWNLOAD_AAB.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove generated sample tests
        run: rm -rf test

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare release signing
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$UPLOAD_KEYSTORE_BASE64" ] || [ -z "$UPLOAD_KEYSTORE_PASSWORD" ] || [ -z "$UPLOAD_KEY_ALIAS" ] || [ -z "$UPLOAD_KEY_PASSWORD" ]; then
            echo "Missing signing secrets. Add UPLOAD_KEYSTORE_BASE64, UPLOAD_KEYSTORE_PASSWORD, UPLOAD_KEY_ALIAS, and UPLOAD_KEY_PASSWORD."
            exit 1
          fi
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$UPLOAD_KEYSTORE_PASSWORD
          keyPassword=$UPLOAD_KEY_PASSWORD
          keyAlias=$UPLOAD_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Set Android package, SDK and signing
        run: |
          cat > android/app/build.gradle.kts <<'EOF'
          @file:Suppress("DEPRECATION")

          import java.io.FileInputStream
          import java.util.Properties

          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace = "com.explapp.shoppinglist"
              compileSdk = flutter.compileSdkVersion
              ndkVersion = flutter.ndkVersion

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              defaultConfig {
                  applicationId = "com.explapp.shoppinglist"
                  minSdk = 23
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }

              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }

          flutter {
              source = "../.."
          }
          EOF

      - name: Create MainActivity in final package
        run: |
          mkdir -p android/app/src/main/kotlin/com/explapp/shoppinglist
          cat > android/app/src/main/kotlin/com/explapp/shoppinglist/MainActivity.kt <<'EOF'
          package com.explapp.shoppinglist

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity()
          EOF

      - name: Simple AndroidManifest without sensitive permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="قائمة المشتريات"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name="com.explapp.shoppinglist.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build signed APK
        run: flutter build apk --release

      - name: Build signed AAB for Google Play
        run: flutter build appbundle --release

      - name: Copy build outputs
        run: |
          mkdir -p apk play
          cp build/app/outputs/flutter-apk/app-release.apk apk/shopping-list.apk
          cp build/app/outputs/bundle/release/app-release.aab play/shopping-list.aab

      - name: Update download pages
        run: |
          REPO="${GITHUB_REPOSITORY}"
          cat > DOWNLOAD_APK.md <<EOF
          # تحميل قائمة المشتريات

          APK مباشر للتجربة خارج Google Play:

          https://github.com/${REPO}/raw/main/apk/shopping-list.apk
          EOF
          cat > DOWNLOAD_AAB.md <<EOF
          # ملف Google Play AAB

          ملف الرفع على Google Play Console:

          https://github.com/${REPO}/raw/main/play/shopping-list.aab

          هذا الملف موقّع بتوقيع Release عبر GitHub Secrets.
          EOF

      - name: Commit build outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/shopping-list.apk play/shopping-list.aab DOWNLOAD_APK.md DOWNLOAD_AAB.md
          git commit -m "Build signed Google Play AAB and APK" || echo "No changes to commit"
          git push
