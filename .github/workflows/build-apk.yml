name: Build Google Play AAB and APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "apk/**"
      - "play/**"
      - "DOWNLOAD_APK.md"
      - "DOWNLOAD_AAB.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove generated sample tests
        run: rm -rf test

      - name: Flutter pub get
        run: flutter pub get

      - name: Set Android package and minimum SDK
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            perl -0pi -e 's/applicationId = "[^"]+"/applicationId = "com.explapp.shoppinglist"/g' android/app/build.gradle.kts
            perl -0pi -e 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            perl -0pi -e "s/applicationId ['\"][^'\"]+['\"]/applicationId 'com.explapp.shoppinglist'/g" android/app/build.gradle
            perl -0pi -e 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle
          fi

      - name: Simple AndroidManifest without sensitive permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="قائمة المشتريات"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB for Google Play
        run: flutter build appbundle --release

      - name: Copy build outputs
        run: |
          mkdir -p apk play
          cp build/app/outputs/flutter-apk/app-release.apk apk/shopping-list.apk
          cp build/app/outputs/bundle/release/app-release.aab play/shopping-list.aab

      - name: Update download pages
        run: |
          REPO="${GITHUB_REPOSITORY}"
          cat > DOWNLOAD_APK.md <<EOF
          # تحميل قائمة المشتريات

          APK مباشر للتجربة خارج Google Play:

          https://github.com/${REPO}/raw/main/apk/shopping-list.apk
          EOF
          cat > DOWNLOAD_AAB.md <<EOF
          # ملف Google Play AAB

          ملف الرفع على Google Play Console:

          https://github.com/${REPO}/raw/main/play/shopping-list.aab

          ملاحظة: قبل النشر النهائي يجب اعتماد مفتاح توقيع رسمي ثابت للحساب.
          EOF

      - name: Commit build outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/shopping-list.apk play/shopping-list.aab DOWNLOAD_APK.md DOWNLOAD_AAB.md
          git commit -m "Build Google Play AAB and APK" || echo "No changes to commit"
          git push
